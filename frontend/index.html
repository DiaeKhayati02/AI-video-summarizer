<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YT Summariser</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
            <path d="M21.6 7.2c-.24-.9-.95-1.6-1.85-1.85C18.1 5 12 5 12 5s-6.1 0-7.75.35c-.9.25-1.6.95-1.85 1.85C2 8.85 2 12 2 12s0 3.15.4 4.8c.25.9.95 1.6 1.85 1.85C5.9 19 12 19 12 19s6.1 0 7.75-.35c.9-.25 1.6-.95 1.85-1.85.4-1.65.4-4.8.4-4.8s0-3.15-.4-4.8ZM10 15.2V8.8l5.5 3.2-5.5 3.2Z"/>
          </svg>
        </div>
        <span class="brand-name">YT Summariser</span>
      </div>
      <button id="new-summary-btn" class="btn-ghost hidden" type="button">+ New summary</button>
    </header>

    <div id="intro" class="intro">
      <div class="intro-card">
        <h1>Paste a YouTube link</h1>
        <p>Get a structured summary, then ask anything about the video.</p>
        <div class="url-row">
          <input id="url-input" type="text" placeholder="https://www.youtube.com/watch?v=..." autocomplete="off" />
          <button id="summarise-btn" type="button">
            <span class="btn-label">Summarise</span>
            <span class="spinner hidden" aria-hidden="true"></span>
          </button>
        </div>
        <div id="error-banner" class="error-banner hidden" role="alert"></div>
      </div>
    </div>

    <div id="workspace" class="workspace hidden">
      <aside class="sidebar">
        <div class="video-thumb-wrap">
          <img id="video-thumbnail" class="video-thumbnail" alt="Video thumbnail" />
          <span id="duration-badge" class="duration-badge"></span>
        </div>
        <div class="sidebar-body">
          <h2 id="video-title" class="video-title"></h2>
          <p id="video-channel" class="video-channel"></p>
          <p id="video-description" class="video-description"></p>
          <hr class="sidebar-divider" />
          <h3 class="takeaways-label">Key Takeaways</h3>
          <ul id="key-takeaways" class="key-takeaways"></ul>
          <a id="video-link" class="video-link" href="#" target="_blank" rel="noopener noreferrer">Watch on YouTube &#8599;</a>
        </div>
      </aside>

      <main class="chat-pane">
        <div class="chat-pane-header">Ask about this video</div>
        <div id="chat-messages" class="chat-messages"></div>
        <div id="suggested-questions" class="suggested-questions"></div>
        <form id="chat-form" class="chat-form">
          <textarea
            id="question-input"
            rows="1"
            placeholder="Ask a question... (Enter to send, Shift+Enter for newline)"
          ></textarea>
          <button id="send-btn" type="submit">
            <span class="btn-label">Send</span>
            <span class="spinner hidden" aria-hidden="true"></span>
          </button>
        </form>
      </main>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
