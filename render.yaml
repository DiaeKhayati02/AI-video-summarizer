services:
  - name: ai-video-summarizer-backend
    type: web
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: MODEL_NAME
        value: gemini-flash-latest
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
